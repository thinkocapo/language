<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Practice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      padding: 40px 24px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: normal;
      letter-spacing: 0.15em;
      color: #aaa;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 40px;
    }

    button {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #ccc;
      padding: 8px 20px;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: #2a2a2a;
      color: #fff;
    }

    .sentences {
      max-width: 820px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 6px;
      padding: 24px 28px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 16px;
    }

    .sentence-parts {
      display: flex;
      align-items: flex-end;
      gap: 28px;
      flex-wrap: wrap;
    }

    .token {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    .label.tense   { color: #7a9fbf; }
    .label.article { color: #9b7fbf; }

    .word {
      font-size: 1.25rem;
      color: #e0e0e0;
      letter-spacing: 0.03em;
    }

    .word.pronoun { color: #c8a96e; }
    .word.verb    { color: #7fbf8e; }
    .word.noun    { color: #bf8e7f; }
    .word.obj-pronoun { color: #c8a96e; font-style: italic; }

    .answer-btn {
      background: #1a1a2e;
      border-color: #2a2a4a;
      color: #7a7abf;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    .answer-btn:hover {
      background: #1e1e3a;
      color: #aaaaff;
    }

    .answer-area {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #252525;
      font-size: 0.95rem;
      color: #888;
      grid-column: 1 / -1;
      font-style: italic;
    }
  </style>
</head>
<body>

<header>
  <h1>German Practice</h1>
</header>

<div class="controls">
  <button onclick="generate()">Generate 10 Sentences</button>
</div>

<div class="sentences" id="sentences"></div>

<script>
// ── Vocab ─────────────────────────────────────────────────────────────────────

const PRONOUNS = [
  { de: 'ich' }, { de: 'du' }, { de: 'er' }, { de: 'sie' }, { de: 'es' },
  { de: 'wir' }, { de: 'ihr' }, { de: 'sie' }, { de: 'Sie' }
];

// Accusative object pronouns (mich, dich, ihn, etc.)
const OBJ_PRONOUNS = [
  'mich', 'dich', 'ihn', 'sie', 'es', 'uns', 'euch', 'sie', 'Sie'
];

const VERBS = [
  { inf: 'sein' },    { inf: 'haben' },   { inf: 'machen' },
  { inf: 'gehen' },   { inf: 'kommen' },  { inf: 'sehen' },
  { inf: 'geben' },   { inf: 'nehmen' },  { inf: 'sprechen' },
  { inf: 'fahren' },  { inf: 'essen' },   { inf: 'trinken' },
  { inf: 'schlafen' },{ inf: 'lesen' },   { inf: 'schreiben' },
  { inf: 'hören' },   { inf: 'fragen' },  { inf: 'arbeiten' },
  { inf: 'spielen' }, { inf: 'lernen' },  { inf: 'kaufen' },
  { inf: 'wohnen' },  { inf: 'laufen' },  { inf: 'kochen' },
  { inf: 'helfen' },  { inf: 'warten' },  { inf: 'suchen' },
  { inf: 'zeigen' },  { inf: 'bringen' }, { inf: 'treffen' },
  { inf: 'besuchen' },{ inf: 'vergessen' },{ inf: 'verstehen' },
];

// Nouns: { de, gender: m/f/n }
const NOUNS = [
  { de: 'Mann',    gender: 'm' }, { de: 'Frau',    gender: 'f' },
  { de: 'Kind',    gender: 'n' }, { de: 'Hund',    gender: 'm' },
  { de: 'Katze',   gender: 'f' }, { de: 'Buch',    gender: 'n' },
  { de: 'Tisch',   gender: 'm' }, { de: 'Stuhl',   gender: 'm' },
  { de: 'Auto',    gender: 'n' }, { de: 'Haus',    gender: 'n' },
  { de: 'Stadt',   gender: 'f' }, { de: 'Schule',  gender: 'f' },
  { de: 'Wasser',  gender: 'n' }, { de: 'Brot',    gender: 'n' },
  { de: 'Apfel',   gender: 'm' }, { de: 'Milch',   gender: 'f' },
  { de: 'Tee',     gender: 'm' }, { de: 'Kaffee',  gender: 'm' },
  { de: 'Zeitung', gender: 'f' }, { de: 'Film',    gender: 'm' },
  { de: 'Arbeit',  gender: 'f' }, { de: 'Geld',    gender: 'n' },
  { de: 'Brief',   gender: 'm' }, { de: 'Tasche',  gender: 'f' },
  { de: 'Küche',   gender: 'f' }, { de: 'Zimmer',  gender: 'n' },
];

const TENSES = ['present', 'präterite', 'perfekt', 'futur'];

// ── Helpers ───────────────────────────────────────────────────────────────────

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function articleType() {
  const r = Math.random();
  if (r < 1/3) return 'definite';
  if (r < 2/3) return 'indefinite';
  return 'none';
}

function sentencePattern() {
  const r = Math.random();
  if (r < 1/3) return 'P-V-N';          // pronoun verb noun
  if (r < 2/3) return 'P-V-OP';         // pronoun verb obj-pronoun
  return 'P-V-N-OP';                     // pronoun verb noun obj-pronoun
}

// ── Render ────────────────────────────────────────────────────────────────────

function token(label, word, cls, labelCls = '') {
  return `
    <div class="token">
      <span class="label ${labelCls}">${label}</span>
      <span class="word ${cls}">${word}</span>
    </div>`;
}

function buildCard(i) {
  const pronoun  = pick(PRONOUNS);
  const verb     = pick(VERBS);
  const noun     = pick(NOUNS);
  const objPron  = pick(OBJ_PRONOUNS);
  const tense    = pick(TENSES);
  const art      = articleType();
  const pattern  = sentencePattern();

  let parts = '';
  parts += token('pronoun', pronoun.de, 'pronoun');
  parts += token(tense, verb.inf, 'verb', 'tense');

  if (pattern === 'P-V-N' || pattern === 'P-V-N-OP') {
    if (art !== 'none') {
      parts += token(art, '___', 'noun', 'article');
    }
    parts += token('noun', noun.de, 'noun');
  }

  if (pattern === 'P-V-OP' || pattern === 'P-V-N-OP') {
    parts += token('obj. pronoun', objPron, 'obj-pronoun');
  }

  return `
    <div class="card" id="card-${i}">
      <div class="sentence-parts">${parts}</div>
      <button class="answer-btn" onclick="toggleAnswer(${i})">ANSWER</button>
      <div class="answer-area" id="answer-${i}">
        — answer coming soon —
      </div>
    </div>`;
}

function generate() {
  const container = document.getElementById('sentences');
  container.innerHTML = '';
  for (let i = 0; i < 10; i++) {
    container.insertAdjacentHTML('beforeend', buildCard(i));
  }
}

function toggleAnswer(i) {
  const el = document.getElementById(`answer-${i}`);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// Auto-generate on load
generate();
</script>
</body>
</html>
